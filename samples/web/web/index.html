<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ori Crypto Tracker</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:560px;margin:40px auto;padding:0 16px;background:#0d1117;color:#e6edf3;}
  h1{font-size:1.15rem;font-weight:600;color:#7ee787;margin-bottom:4px;}
  #status{color:#8b949e;font-size:.85rem;margin-bottom:16px;}
  #app{}
  .ori-text{padding:6px 0;border-bottom:1px solid #21262d;font-size:.95rem;}
  .ori-btn{margin:12px 0;padding:8px 18px;border:1px solid #388bfd;border-radius:6px;
           background:transparent;color:#388bfd;cursor:pointer;font-size:.9rem;}
  .ori-btn:hover{background:#388bfd22;}
  .ori-edit{width:100%;box-sizing:border-box;padding:8px;background:#161b22;
            border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:.95rem;margin:6px 0;}
  .ori-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #21262d;}
  .ori-item span{flex:1;}
  .ori-item .del{color:#f85149;cursor:pointer;font-size:.85rem;background:none;border:none;padding:2px 6px;}
  .ori-item .toggle{cursor:pointer;background:none;border:1px solid #30363d;border-radius:4px;
                    padding:2px 8px;color:#8b949e;font-size:.8rem;}
  .badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:.75rem;
         background:#1f6feb44;color:#388bfd;margin-left:6px;}
</style>
</head>
<body>
<h1>🪙 Ori Crypto Tracker</h1>
<div id="status">Initialising Ori VM (WebAssembly)...</div>
<div id="app"></div>

<script src="orivm.js"></script>
<script>
const COINGECKO_URL =
  'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin&vs_currencies=usd';

let vm, ori_dispatch;

// ── Render widget spec ───────────────────────────────────────────────────────
let editValue = '';
function render(spec) {
  const app = document.getElementById('app');
  app.innerHTML = '';
  for (const line of spec.split('\n')) {
    if (!line.trim()) continue;
    const [type, ...parts] = line.split('|');
    if (type === 'text') {
      const d = document.createElement('div');
      d.className = 'ori-text';
      d.textContent = parts.join('|');
      app.appendChild(d);
    } else if (type === 'edit') {
      const inp = document.createElement('input');
      inp.className = 'ori-edit'; inp.placeholder = parts[0] || '';
      inp.addEventListener('input', e => editValue = e.target.value);
      app.appendChild(inp);
    } else if (type === 'btn') {
      const [ev, arg, caption] = parts;
      const btn = document.createElement('button');
      btn.className = 'ori-btn'; btn.textContent = caption;
      btn.addEventListener('click', () => {
        const a = arg === '@edit' ? editValue : arg;
        const next = ori_dispatch(ev, a);
        if (next) render(next);
        if (ev === 'refresh') fetchPrices();
      });
      app.appendChild(btn);
    } else if (type === 'item') {
      const [tev, dev, arg, caption] = parts;
      const row = document.createElement('div'); row.className = 'ori-item';
      const span = document.createElement('span'); span.textContent = caption;
      const tog = document.createElement('button'); tog.className = 'toggle'; tog.textContent = '✓';
      tog.addEventListener('click', () => {
        const next = ori_dispatch(tev, arg); if (next) render(next);
      });
      const del = document.createElement('button'); del.className = 'del'; del.textContent = '✕';
      del.addEventListener('click', () => {
        const next = ori_dispatch(dev, arg); if (next) render(next);
      });
      row.appendChild(tog); row.appendChild(span); row.appendChild(del);
      app.appendChild(row);
    }
  }
}

// ── Fetch prices & dispatch to Ori ──────────────────────────────────────────
async function fetchPrices() {
  document.getElementById('status').textContent = 'Fetching prices from CoinGecko…';
  try {
    const r = await fetch(COINGECKO_URL);
    const body = await r.text();
    const spec = ori_dispatch('update', body);
    if (spec) render(spec);
    document.getElementById('status').textContent = 'Ready — logic runs in the Ori C VM (WebAssembly)';
  } catch (e) {
    const spec = ori_dispatch('update', '');
    if (spec) render(spec);
    document.getElementById('status').textContent = 'Network error — CoinGecko unreachable';
  }
}

// ── Boot Ori VM ─────────────────────────────────────────────────────────────
async function boot() {
  const statusEl = document.getElementById('status');
  try {
    statusEl.textContent = 'Loading WebAssembly VM…';
    vm = await createOriVM({ print: () => {}, printErr: () => {} });
    const resp = await fetch('./app.orb', { cache: 'no-store' });
    const buf  = await resp.arrayBuffer();
    const data = new Uint8Array(buf);
    vm.FS.writeFile('/app.orb', data);
    vm.callMain(['/app.orb']);
    // ori_call2 passes two separate string args to the Ori function
    ori_dispatch = (ev, arg) => vm.ccall('ori_call2', 'string', ['string','string','string'], ['dispatch', ev||'', arg||'']);
    const initial = ori_dispatch('init', '');
    if (initial) render(initial);
    statusEl.textContent = 'VM ready — fetching live prices…';
    fetchPrices();
    setInterval(fetchPrices, 60000);  // auto-refresh every minute
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    console.error(e);
  }
}
boot();
</script>
</body>
</html>
