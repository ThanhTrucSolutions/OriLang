<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ori app</title>
<style>
  body { background:#0f1116; color:#e6e9f0; font-family:'Segoe UI',sans-serif; margin:0; padding:28px; }
  #app { max-width:560px; margin:0 auto; }
  .t { font-size:15px; padding:3px 0; }
  .t:first-child { font-size:24px; font-weight:600; }
  .erow { display:flex; gap:8px; margin:12px 0; }
  input.edit { flex:1; padding:11px 13px; border-radius:8px; border:1px solid #2a2e38;
               background:#181a20; color:#e6e9f0; font-size:15px; outline:none; }
  button { padding:11px 16px; border:none; border-radius:8px; background:#3078dc; color:#fff;
           font-weight:600; font-size:14px; cursor:pointer; }
  .item { display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid #23272f; }
  .item .cap { flex:1; cursor:pointer; font-size:16px; }
  .item.done .cap { text-decoration:line-through; color:#6b7280; }
  .item .del { background:transparent; color:#7a8089; font-size:15px; padding:6px 10px; }
  .item .del:hover { color:#ff6b6b; }
</style>
</head>
<body>
  <div id="app">loading the Ori VM…</div>
  <script src="orivm.js"></script>
  <script>
    let M = null, editText = "";
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');

    function render(spec) {
      const root = document.getElementById('app');
      root.innerHTML = "";
      for (const line of spec.split("\n")) {
        if (!line) continue;
        const i = line.indexOf('|');
        const type = i < 0 ? line : line.slice(0, i);
        const rest = i < 0 ? "" : line.slice(i + 1);
        if (type === "text") {
          const d = document.createElement('div'); d.className = 't'; d.textContent = rest; root.append(d);
        } else if (type === "edit") {
          const wrap = document.createElement('div'); wrap.className = 'erow';
          const inp = document.createElement('input'); inp.className = 'edit';
          inp.placeholder = rest; inp.value = editText;
          inp.oninput = () => editText = inp.value;
          inp.onkeydown = e => { if (e.key === 'Enter') { const b = root.querySelector('.erow button'); if (b) b.click(); } };
          wrap.append(inp); root.append(wrap);
          root._editWrap = wrap;
        } else if (type === "btn") {
          const parts = rest.split('|'); const ev = parts[0], arg = parts[1], cap = parts.slice(2).join('|');
          const b = document.createElement('button'); b.textContent = cap;
          b.onclick = () => { let a = arg; if (arg === '@edit') { a = editText; editText = ""; } render(call2(ev, a)); };
          if (root._editWrap) root._editWrap.append(b); else root.append(b);
        } else if (type === "item") {
          const parts = rest.split('|'); const tap = parts[0], del = parts[1], arg = parts[2], cap = parts.slice(3).join('|');
          const row = document.createElement('div'); row.className = 'item' + (cap.startsWith('[x]') ? ' done' : '');
          const span = document.createElement('span'); span.className = 'cap'; span.textContent = cap;
          span.onclick = () => render(call2(tap, arg));
          const x = document.createElement('button'); x.className = 'del'; x.textContent = '✕';
          x.onclick = () => render(call2(del, arg));
          row.append(span, x); root.append(row);
        }
      }
    }
    function call2(ev, arg) {
      return M.ccall('ori_call2', 'string', ['string','string','string'], ['dispatch', ev, arg]);
    }

    (async () => {
      M = await createOriVM({ print: () => {}, printErr: () => {} });
      const buf = new Uint8Array(await (await fetch('app.orb?' + Date.now(), { cache: 'no-store' })).arrayBuffer());
      M.FS.writeFile('/app.orb', buf);
      M.callMain(['/app.orb']);   // boot the Ori program (defines render/dispatch + seeds)
      render(M.ccall('ori_call_str', 'string', ['string','string'], ['render', '']));
    })();
  </script>
</body>
</html>
